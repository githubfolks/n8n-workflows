version: '3.8'

services:
  # --- Application Services ---
  app:
    build: .
    ports:
      - "9001:8000"
    # env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-automation-net

  story-ui:
    build:
      context: ./story-ui
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    ports:
      - "8004:80"
    networks:
      - ai-automation-net
    restart: unless-stopped

  image-service:
    build: ./image_service
    ports:
      - "8001:8001"
    # env_file: .env
    depends_on:
      - stable-diffusion
    networks:
      - ai-automation-net
    environment:
      - SD_API_URL=http://stable-diffusion:7860
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}

  video-service:
    build: ./video_service
    ports:
      - "8002:8002"
    # env_file: .env
    environment:
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
    networks:
      - ai-automation-net

  # --- AI Infrastructure ---

  stable-diffusion:
    image: siutin/stable-diffusion-webui-docker:latest-cpu
    ports:
      - "7860:7860"
    environment:
      - CLI_ARGS=--api --listen --no-half --skip-torch-cuda-test
    command: ./webui.sh --listen --port 7860 --api --no-half --skip-torch-cuda-test
    volumes:
      - sd_data:/data
    networks:
      - ai-automation-net
    # deploy: ... (uncomment for GPU)
    restart: unless-stopped
    stdin_open: true
    tty: true

  # --- Workflow Automation ---
  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    user: root
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_PUBLIC_DOMAIN_OR_IP}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://${N8N_PUBLIC_DOMAIN_OR_IP}:5678/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=host.docker.internal
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=app_db
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=ViKram#2026
      - DB_POSTGRESDB_SCHEMA=aadikarta_n8n
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FACEBOOK_PAGE_ID=${FACEBOOK_PAGE_ID}
      - FACEBOOK_PAGE_ACCESS_TOKEN=${FACEBOOK_PAGE_ACCESS_TOKEN}
      - INSTAGRAM_BUSINESS_ACCOUNT_ID=${INSTAGRAM_BUSINESS_ACCOUNT_ID}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,https,url
      - NODES_EXCLUDE=[]
      - N8N_SECURE_COOKIE=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-data:/data/n8n-work
    networks:
      - ai-automation-net

networks:
  ai-automation-net:
    driver: bridge

volumes:
  n8n_data:
  sd_data:
